<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><title>CloudPilot</title><link rel="stylesheet" href="/assets/style.css"/></head><body><div id="app"><header><div><h1>CloudPilot</h1><p>搜索 → 网盘 → 转存</p></div><button id="logout" class="ghost hidden">退出</button></header><main id="loginPage" class="card"><h2>登录</h2><input id="username" placeholder="用户名" value="admin"/><input id="password" placeholder="密码" type="password" value="admin123"/><button id="loginBtn">登录</button><p id="loginMsg" class="msg"></p></main><main id="mainPage" class="hidden"><nav><button data-tab="search" class="active">搜索</button><button data-tab="subs">订阅</button><button data-tab="tasks">转存</button><button data-tab="settings">配置</button></nav><section id="tab-search" class="tab"><div class="card"><h2>搜索网盘资源</h2><div class="flow">搜索 → PanSou → 网盘结果 → 一键转存</div><div class="row"><input id="keyword" placeholder="例如：流浪地球 4K"/><button id="searchBtn">搜索</button></div><p id="searchMsg" class="msg"></p></div><div id="results"></div></section><section id="tab-subs" class="tab hidden"><div class="card"><h2>订阅</h2><input id="subKeyword" placeholder="订阅关键词"/><select id="subDisk"><option value="all">全部网盘</option><option value="quark">夸克</option><option value="115">115</option><option value="aliyun">阿里</option><option value="uc">UC</option></select><input id="subInclude" placeholder="包含关键词，可空"/><input id="subExclude" placeholder="排除关键词，可空"/><input id="subTarget" placeholder="目标目录ID/FID，可空"/><button id="addSubBtn">保存订阅</button></div><div id="subs"></div></section><section id="tab-tasks" class="tab hidden"><div class="card"><h2>转存任务</h2><button id="reloadTasks">刷新</button></div><div id="tasks"></div></section><section id="tab-settings" class="tab hidden"><div class="card"><h2>配置</h2><input id="pansou_base_url" placeholder="PanSou API 地址，例如 http://192.168.10.15:8888"/><input id="notify_webhook" placeholder="通知 Webhook：企业微信 / 飞书 / Telegram网关"/><h3>网盘配置</h3><div id="driveSettings"></div><button id="saveSettings">保存</button><button id="testNotify" class="ghost">测试通知</button><p id="settingsMsg" class="msg"></p></div></section></main></div><script src="/assets/app.js"></script></body></html>
